name: Build and Upload Gnix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build ISO
      run: make -j$(nproc)

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: os.img
        path: os.img
